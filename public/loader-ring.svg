<svg width="512" height="320" viewBox="0 0 512 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loading">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0a0d10"/>
      <stop offset="100%" stop-color="#050709"/>
    </radialGradient>
    <linearGradient id="ringGradient" x1="15%" y1="20%" x2="85%" y2="80%">
      <stop offset="0%" stop-color="#fff4b8"/>
      <stop offset="28%" stop-color="#ffd37a"/>
      <stop offset="47%" stop-color="#ff9a5c"/>
      <stop offset="63%" stop-color="#ff6b4e"/>
      <stop offset="78%" stop-color="#7ed9ff"/>
      <stop offset="100%" stop-color="#9fffd1"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="320" fill="url(#bg)"/>

  <ellipse cx="256" cy="160" rx="58" ry="58" fill="none" stroke="url(#ringGradient)" stroke-width="20" filter="url(#softGlow)"
    stroke-linecap="round" stroke-dasharray="290 92" transform="rotate(-26 256 160)">
    <animateTransform attributeName="transform" type="rotate" from="-26 256 160" to="334 256 160" dur="1.2s" repeatCount="indefinite"/>
  </ellipse>

  <ellipse cx="256" cy="160" rx="58" ry="58" fill="none" stroke="#ffffff55" stroke-width="5" stroke-linecap="round" stroke-dasharray="36 220"
    transform="rotate(48 256 160)">
    <animateTransform attributeName="transform" type="rotate" from="48 256 160" to="-312 256 160" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
</svg>
